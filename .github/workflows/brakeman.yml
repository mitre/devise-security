name: Brakeman

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  brakeman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run Brakeman
        run: bundle exec brakeman -p test/dummy -z -q --format sarif --output brakeman.sarif
      - name: Upload Brakeman results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: brakeman.sarif
