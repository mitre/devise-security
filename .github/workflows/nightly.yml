name: Nightly (Experimental)

on:
  schedule:
    # Daily at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    name: "${{ matrix.ruby }} / Rails ${{ matrix.rails }} / ${{ matrix.orm }}"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # ruby-head + ActiveRecord across all Rails versions
          - { ruby: head, rails: "7.0", orm: active_record }
          - { ruby: head, rails: "7.1", orm: active_record }
          - { ruby: head, rails: "7.2", orm: active_record }
          - { ruby: head, rails: "8.0", orm: active_record }
          # ruby-head + Mongoid across all Rails versions
          - { ruby: head, rails: "7.0", orm: mongoid }
          - { ruby: head, rails: "7.1", orm: mongoid }
          - { ruby: head, rails: "7.2", orm: mongoid }
          - { ruby: head, rails: "8.0", orm: mongoid }
          # rails-head + ActiveRecord on latest stable Rubies
          - { ruby: "3.3", rails: main, orm: active_record }
          - { ruby: "3.4", rails: main, orm: active_record }
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - uses: actions/cache@v4
        with:
          path: |
            **/bundle
          key:
            bundle-use-ruby-${{ matrix.ruby }}-rails-${{ matrix.rails }}-orm-${{
            matrix.orm }}-gemfile-${{
            hashFiles(format('**/gemfiles/rails_{0}.gemfile', matrix.rails))
            }}-gemspec-${{ hashFiles('**/devise-security.gemspec') }}
      - name: bundle install
        env:
          BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails }}.gemfile
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagickwand-dev
          bundle config path vendor/bundle
          bundle install
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        if: ${{ matrix.orm == 'mongoid' }}
      - name: Run tests
        env:
          BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails }}.gemfile
          CI: true
          DEVISE_ORM: ${{ matrix.orm }}
        run: |
          bundle exec rake
