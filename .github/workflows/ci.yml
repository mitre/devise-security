name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 00:00 on the 1st of every month
    - cron: '0 0 1 * *'

jobs:
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop --format github

  brakeman:
    name: Brakeman
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run Brakeman
        run: bundle exec brakeman -p test/dummy -z -q --format sarif --output brakeman.sarif
      - name: Upload Brakeman results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: brakeman.sarif

  test:
    name: "Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }} / ${{ matrix.orm }}"
    needs: [rubocop, brakeman]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        orm: [active_record, mongoid]
        rails: ["7.0", "7.1", "7.2", "8.0"]
        ruby: ["3.1", "3.2", "3.3", "3.4"]
        exclude:
          - rails: "8.0"
            ruby: "3.1"
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - uses: actions/cache@v4
        with:
          path: |
            **/bundle
          key:
            bundle-use-ruby-${{ matrix.ruby }}-rails-${{ matrix.rails }}-orm-${{
            matrix.orm }}-gemfile-${{
            hashFiles(format('**/gemfiles/rails_{0}.gemfile', matrix.rails))
            }}-gemspec-${{ hashFiles('**/devise-security.gemspec') }}
      - name: bundle install
        env:
          BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails }}.gemfile
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagickwand-dev
          bundle config path vendor/bundle
          bundle install
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        if: ${{ matrix.orm == 'mongoid' }}
      - name: Run tests
        env:
          BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails }}.gemfile
          CI: true
          DEVISE_ORM: ${{ matrix.orm }}
        run: |
          bundle exec rake
      - name: Coveralls Parallel
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name:
            run-orm-${{ matrix.orm }}-rails-${{ matrix.rails }}-ruby-${{
            matrix.ruby }}
          parallel: true
          path-to-lcov: ./coverage/lcov/devise-security.lcov

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          file: ./coverage/lcov/devise-security.lcov
